<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Salva Leads</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #1e1e1e;
  color: #fff;
}

h1, h2 {
  color: #fff;
}

.form-group {
  margin-bottom: 12px;
}

label {
  display: block;
  margin-bottom: 4px;
  font-size: 14px;
  color: #ccc;
}

input, textarea {
  width: 100%;
  padding: 10px;
  background: #2c2c2c;
  border: 1px solid #444;
  border-radius: 6px;
  color: #fff;
  font-size: 14px;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #00bcd4;
}

button {
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  background: #00bcd4;
  color: #000;
  font-weight: bold;
}

.tabs button {
  margin-right: 10px;
  background: #333;
  color: #fff;
}

.card {
  background: #2c2c2c;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
  line-height: 1.6;
}
</style>
</head>

<body>

<h1>📋 Salva Leads</h1>

<div class="tabs">
  <button onclick="mostrarAba('todos')">📦 Leads</button>
  <button onclick="mostrarAba('reservados')">📌 Leads Reservados</button>
</div>

<hr>

<h2>Cadastro</h2>

<div class="form-group">
  <label>📍 Lead (Nome)</label>
  <input id="lead">
</div>

<div class="form-group">
  <label>💼 Segmento</label>
  <input id="segmento">
</div>

<div class="form-group">
  <label>🌐 Sistema Atual</label>
  <input id="sistema">
</div>

<div class="form-group">
  <label>👷 Técnicos</label>
  <input id="tecnicos">
</div>

<div class="form-group">
  <label>📌 Internos</label>
  <input id="internos">
</div>

<div class="form-group">
  <label>📄 Contratos</label>
  <input id="contratos">
</div>

<div class="form-group">
  <label>📎 O.S. por dia</label>
  <input id="os">
</div>

<div class="form-group">
  <label>⚠️ Ponto de Dor</label>
  <input id="dor">
</div>

<div class="form-group">
  <label>📞 Telefone</label>
  <input id="telefone">
</div>

<div class="form-group">
  <label>✉️ Email</label>
  <input id="email">
</div>

<div class="form-group">
  <label>📌 Agendamento</label>
  <input id="agendamento">
</div>

<div class="form-group">
  <label>📝 Informações Extras</label>
  <textarea id="extras"></textarea>
</div>

<button onclick="salvarLead()">Salvar Lead</button>

<hr>

<h2>🔍 Buscar</h2>
<div class="form-group">
  <label>Buscar</label>
  <input id="busca" onkeyup="renderLeads()">
</div>

<div id="lista"></div>

<script>
let leads = JSON.parse(localStorage.getItem("leads")) || [];
let abaAtual = "todos";

function salvarLead() {
  const lead = {
    nome: document.getElementById("lead").value,
    segmento: document.getElementById("segmento").value,
    sistema: document.getElementById("sistema").value,
    tecnicos: document.getElementById("tecnicos").value,
    internos: document.getElementById("internos").value,
    contratos: document.getElementById("contratos").value,
    os: document.getElementById("os").value,
    dor: document.getElementById("dor").value,
    telefone: document.getElementById("telefone").value,
    email: document.getElementById("email").value,
    agendamento: document.getElementById("agendamento").value,
    extras: document.getElementById("extras").value,
    reservado: false
  };

  leads.push(lead);
  salvarStorage();
  limparCampos();
  renderLeads();
}

function salvarStorage() {
  localStorage.setItem("leads", JSON.stringify(leads));
}

function limparCampos() {
  document.querySelectorAll("input, textarea").forEach(el => el.value = "");
}

function deletarLead(index) {
  leads.splice(index, 1);
  salvarStorage();
  renderLeads();
}

function reservarLead(index) {
  leads[index].reservado = true;
  salvarStorage();
  renderLeads();
}

function removerReservado(index) {
  leads[index].reservado = false;
  salvarStorage();
  renderLeads();
}

function mostrarAba(aba) {
  abaAtual = aba;
  renderLeads();
}

function renderLeads() {
  const busca = document.getElementById("busca").value.toLowerCase();
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  leads.forEach((lead, index) => {

    if (
      lead.nome.toLowerCase().includes(busca) ||
      lead.telefone.toLowerCase().includes(busca) ||
      lead.segmento.toLowerCase().includes(busca)
    ) {

      if (
        (abaAtual === "todos" && !lead.reservado) ||
        (abaAtual === "reservados" && lead.reservado)
      ) {

        lista.innerHTML += `
        <div class="card">
          <strong>📍${lead.nome}</strong><br>
          💼 Segmento: ${lead.segmento}<br>
          🌐 Sistema Atual: ${lead.sistema}<br>
          👷 Técnicos: ${lead.tecnicos}<br>
          📌 Internos: ${lead.internos}<br>
          📄 Contratos: ${lead.contratos}<br>
          📎 O.S.: ${lead.os}<br>
          ⚠️ Dor: ${lead.dor}<br>
          📞 ${lead.telefone}<br>
          ✉️ ${lead.email}<br>
          📌 Agendamento: ${lead.agendamento}<br>
          📝 Extras: ${lead.extras}<br><br>

          ${
            lead.reservado
            ? `<button onclick="removerReservado(${index})">❌ Remover</button>`
            : `<button onclick="reservarLead(${index})">📌 Reservar</button>`
          }

          <button onclick="deletarLead(${index})">🗑 Excluir</button>
        </div>
        `;
      }
    }
  });
}

renderLeads();
</script>

</body>
</html>
