<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Salva Leads</title>

<style>
body { font-family: Arial; margin: 20px; background: #1e1e1e; color: #fff; }
body.light { background: #f5f5f5; color: #000; }

.form-group { margin-bottom: 12px; }
label { display: block; margin-bottom: 4px; font-size: 14px; color: #ccc; }
body.light label { color: #555; }

input, textarea {
  width: 100%; padding: 10px; background: #2c2c2c; border: 1px solid #444;
  border-radius: 6px; color: #fff; font-size: 14px;
}

body.light input, body.light textarea {
  background: #fff; color: #000; border: 1px solid #ccc;
}

button { padding: 8px; margin-top: 10px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
.tabs button { margin-right: 10px; background: #333; color: #fff; }

.btn-danger { background: #e53935; color: #fff; }
.btn-primary { background: #2196f3; color: #fff; }
.btn-copy { background: #1976d2; color: #fff; }

.card { background: #2c2c2c; padding: 15px; border-radius: 10px; margin-top: 10px; line-height: 1.6; }
body.light .card { background: #fff; }

.tag { display: inline-block; padding: 5px 10px; border-radius: 6px; margin: 3px; font-size: 12px; color: #fff; }
.tag.Qualificado { background: #4caf50; }
.tag.Perdido { background: #e53935; }
.tag.Orçado { background: #ff9800; }
.tag.Fechado { background: #2196f3; }
.tag.No-Show { background: #9c27b0; }

.edit-area { margin-top: 10px; border-top: 1px solid #555; padding-top: 10px; }
</style>
</head>

<body>

<h1>📋 Salva Leads</h1>
<button onclick="toggleTheme()">🌗 Alternar Tema</button>

<div class="tabs">
  <button onclick="mostrarAba('todos')">📦 Leads</button>
  <button onclick="mostrarAba('reservados')">📌 Leads Reservados</button>
</div>

<hr>

<h2>Cadastro</h2>

<div class="form-group"><label>📍 Lead (Nome)</label><input id="lead"></div>
<div class="form-group"><label>💼 Segmento</label><input id="segmento"></div>
<div class="form-group"><label>🌐 Sistema Atual</label><input id="sistema"></div>
<div class="form-group"><label>👷 Técnicos</label><input id="tecnicos"></div>
<div class="form-group"><label>📌 Internos</label><input id="internos"></div>
<div class="form-group"><label>📄 Contratos</label><input id="contratos"></div>
<div class="form-group"><label>📎 O.S. por dia</label><input id="os"></div>
<div class="form-group"><label>⚠️ Ponto de Dor</label><input id="dor"></div>
<div class="form-group"><label>📞 Telefone</label><input id="telefone"></div>
<div class="form-group"><label>✉️ Email</label><input id="email"></div>
<div class="form-group"><label>📌 Agendamento</label><input id="agendamento"></div>
<div class="form-group"><label>📝 Informações Extras</label><textarea id="extras"></textarea></div>

<button onclick="salvarLead()">Salvar Lead</button>

<hr>

<h2>🔍 Buscar</h2>
<div class="form-group"><label>Buscar</label><input id="busca" onkeyup="renderLeads()"></div>

<div id="lista"></div>

<script>
let leads = JSON.parse(localStorage.getItem("leads")) || [];
let abaAtual = "todos";
const TAGS = ["Qualificado","Perdido","Orçado","Fechado","No-Show"];

function salvarLead() {
  const lead = {
    nome: document.getElementById("lead").value,
    segmento: document.getElementById("segmento").value,
    sistema: document.getElementById("sistema").value,
    tecnicos: document.getElementById("tecnicos").value,
    internos: document.getElementById("internos").value,
    contratos: document.getElementById("contratos").value,
    os: document.getElementById("os").value,
    dor: document.getElementById("dor").value,
    telefone: document.getElementById("telefone").value,
    email: document.getElementById("email").value,
    agendamento: document.getElementById("agendamento").value,
    extras: document.getElementById("extras").value,
    reservado: false,
    data: new Date().toLocaleString('pt-BR'),
    tags: []
  };

  leads.unshift(lead);
  salvarStorage();
  limparCampos();
  renderLeads();
}

function salvarStorage(){ localStorage.setItem("leads", JSON.stringify(leads)); }
function limparCampos(){ document.querySelectorAll("input, textarea").forEach(el => el.value = ""); }

function deletarLead(i){
  if(confirm("Tem certeza que deseja excluir este lead?")){
    leads.splice(i,1);
    salvarStorage();
    renderLeads();
  }
}

function reservarLead(i){ leads[i].reservado = true; salvarStorage(); renderLeads(); }
function removerReservado(i){ leads[i].reservado = false; salvarStorage(); renderLeads(); }

function copiarLead(i){
  const l = leads[i];
  const texto = `📍 Lead: ${l.nome}\n💼 Segmento: ${l.segmento}\n🌐 Sistema Atual: ${l.sistema}\n👷 Técnicos: ${l.tecnicos}\n📌 Internos: ${l.internos}\n📄 Contratos: ${l.contratos}\n📎 O.S. por dia: ${l.os}\n⚠️ Ponto de Dor: ${l.dor}\n📞 Telefone: ${l.telefone}\n✉️ E-Mail: ${l.email}\n📌 Agendamento: ${l.agendamento}`;
  navigator.clipboard.writeText(texto);
}

function toggleEdit(i){
  const el = document.getElementById('edit-'+i);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function salvarEdicao(i){
  leads[i].nome = document.getElementById('e_nome_'+i).value;
  leads[i].segmento = document.getElementById('e_segmento_'+i).value;
  leads[i].sistema = document.getElementById('e_sistema_'+i).value;
  leads[i].tecnicos = document.getElementById('e_tecnicos_'+i).value;
  leads[i].internos = document.getElementById('e_internos_'+i).value;
  leads[i].contratos = document.getElementById('e_contratos_'+i).value;
  leads[i].os = document.getElementById('e_os_'+i).value;
  leads[i].dor = document.getElementById('e_dor_'+i).value;
  leads[i].telefone = document.getElementById('e_tel_'+i).value;
  leads[i].email = document.getElementById('e_email_'+i).value;
  leads[i].agendamento = document.getElementById('e_agendamento_'+i).value;
  leads[i].extras = document.getElementById('e_extra_'+i).value;

  const checks = document.querySelectorAll(`.tagcheck-${i}:checked`);
  leads[i].tags = Array.from(checks).map(c => c.value);

  salvarStorage();
  renderLeads();
}

function toggleTheme(){ document.body.classList.toggle("light"); }
function mostrarAba(aba){ abaAtual = aba; renderLeads(); }

function renderLeads(){
  const busca = document.getElementById("busca").value.toLowerCase();
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  leads.forEach((lead, i) => {
    const match = lead.nome.toLowerCase().includes(busca) ||
                  lead.segmento.toLowerCase().includes(busca) ||
                  lead.telefone.toLowerCase().includes(busca) ||
                  (lead.tags && lead.tags.join(' ').toLowerCase().includes(busca));

    if(!match) return;

    if((abaAtual === "todos" && !lead.reservado) || (abaAtual === "reservados" && lead.reservado)){

      lista.innerHTML += `
      <div class="card">
        <strong>📍 Lead: ${lead.nome}</strong><br>
        💼 Segmento: ${lead.segmento}<br>
        🌐 Sistema Atual: ${lead.sistema}<br>
        👷 Técnicos: ${lead.tecnicos}<br>
        📌 Internos: ${lead.internos}<br>
        📄 Contratos: ${lead.contratos}<br>
        📎 O.S. por dia: ${lead.os}<br>
        ⚠️ Ponto de Dor: ${lead.dor}<br>
        📞 Telefone: ${lead.telefone}<br>
        ✉️ E-Mail: ${lead.email}<br>
        📌 Agendamento: ${lead.agendamento}<br>
        📝 Extras: ${lead.extras}<br>
        <small>📅 ${lead.data}</small><br>

        ${(lead.tags||[]).map(t=>`<span class="tag ${t}">${t}</span>`).join('')}

        <br>
        ${lead.reservado ? `<button class="btn-primary" onclick="removerReservado(${i})">Remover</button>` : `<button class="btn-primary" onclick="reservarLead(${i})">Reservar</button>`}
        <button class="btn-copy" onclick="copiarLead(${i})">Copiar</button>
        <button onclick="toggleEdit(${i})">Editar</button>
        <button class="btn-danger" onclick="deletarLead(${i})">Excluir</button>

        <div id="edit-${i}" class="edit-area" style="display:none">
          <input id="e_nome_${i}" value="${lead.nome}" placeholder="Nome">
          <input id="e_segmento_${i}" value="${lead.segmento}" placeholder="Segmento">
          <input id="e_sistema_${i}" value="${lead.sistema}" placeholder="Sistema">
          <input id="e_tecnicos_${i}" value="${lead.tecnicos}" placeholder="Técnicos">
          <input id="e_internos_${i}" value="${lead.internos}" placeholder="Internos">
          <input id="e_contratos_${i}" value="${lead.contratos}" placeholder="Contratos">
          <input id="e_os_${i}" value="${lead.os}" placeholder="OS">
          <input id="e_dor_${i}" value="${lead.dor}" placeholder="Dor">
          <input id="e_tel_${i}" value="${lead.telefone}" placeholder="Telefone">
          <input id="e_email_${i}" value="${lead.email}" placeholder="Email">
          <input id="e_agendamento_${i}" value="${lead.agendamento}" placeholder="Agendamento">
          <textarea id="e_extra_${i}" placeholder="Extras">${lead.extras}</textarea>

          <div>
            ${TAGS.map(tag => `
              <label>
                <input type="checkbox" class="tagcheck-${i}" value="${tag}" ${lead.tags?.includes(tag)?'checked':''}>
                ${tag}
              </label>
            `).join('')}
          </div>

          <button class="btn-primary" onclick="salvarEdicao(${i})">Salvar</button>
        </div>
      </div>`;
    }
  });
}

renderLeads();
</script>

</body>
</html>
